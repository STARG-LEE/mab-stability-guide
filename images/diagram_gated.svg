<text x="570.0" y="36" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">mAb-GATED = 빈칸 채우기 (마스킹된 안정성 노드 예측)</text><g filter="url(#sh)"><rect x="16" y="66" width="184" height="112" rx="18" fill="url(#gCyan)" /></g><text x="108.0" y="109.0" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">입력</text><text x="108.0" y="130.0" text-anchor="middle" font-size="14" font-weight="600" fill="#e0f2fe">6개 카테고리</text><text x="108.0" y="151.0" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">이웃(원인 조건)</text><text x="108.0" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#0369a1">예) 고농도·진탕·low pH</text><g filter="url(#sh)"><rect x="240" y="66" width="176" height="112" rx="18" fill="url(#gIndigo)" /></g><text x="328.0" y="119.25" text-anchor="middle" font-size="15.5" font-weight="800" fill="#fff">① PubMedBERT</text><text x="328.0" y="140.25" text-anchor="middle" font-size="14" font-weight="600" fill="#ede9fe">의미 임베딩</text><g filter="url(#sh)"><rect x="460" y="66" width="176" height="112" rx="18" fill="url(#gPurple)" /></g><text x="548.0" y="119.25" text-anchor="middle" font-size="15.5" font-weight="800" fill="#fff">② GAT</text><text x="548.0" y="140.25" text-anchor="middle" font-size="14" font-weight="600" fill="#ede9fe">이웃 정보 집약</text><g filter="url(#sh)"><rect x="680" y="66" width="176" height="112" rx="18" fill="url(#gViolet)" /></g><text x="768.0" y="119.25" text-anchor="middle" font-size="15.5" font-weight="800" fill="#fff">③ Transformer</text><text x="768.0" y="140.25" text-anchor="middle" font-size="14" font-weight="600" fill="#ede9fe">인코더–디코더</text><g filter="url(#sh)"><rect x="900" y="66" width="204" height="112" rx="18" fill="url(#gRed)" /></g><text x="1002.0" y="105.75" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">정답</text><text x="1002.0" y="125.25" text-anchor="middle" font-size="12.5" font-weight="600" fill="#fee2e2">가려진 안정성 노드</text><text x="1002.0" y="153.25" text-anchor="middle" font-size="21" font-weight="600" fill="#fff">( ??? )</text><line x1="206" y1="122.0" x2="234" y2="122.0" stroke="#94a3b8" stroke-width="3" marker-end="url(#arr)"/><line x1="422" y1="122.0" x2="454" y2="122.0" stroke="#94a3b8" stroke-width="3" marker-end="url(#arr)"/><line x1="642" y1="122.0" x2="674" y2="122.0" stroke="#94a3b8" stroke-width="3" marker-end="url(#arr)"/><line x1="862" y1="122.0" x2="894" y2="122.0" stroke="#94a3b8" stroke-width="3" marker-end="url(#arr)"/><text x="570.0" y="236" text-anchor="middle" font-size="14" font-weight="600" fill="#64748b" font-style="italic">이웃만 보고 가려진 안정성 지표를 맞힌다 → 잘 맞히면 '문헌 패턴은 학습 가능'</text></svg>