<text x="550.0" y="38" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">안정성을 둘러싼 두 질문 = 인과 사슬</text><rect x="24" y="78" width="384" height="180" rx="20" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/><text x="216.0" y="106" text-anchor="middle" font-size="15.5" font-weight="800" fill="#334155">결정요인 (Determinants)</text><g filter="url(#sh)"><rect x="42" y="122" width="168" height="60" rx="14" fill="#c4b5fd"/></g><text x="126.0" y="149" text-anchor="middle" font-size="15" font-weight="800" fill="#1e293b">서열</text><text x="126.0" y="167" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">sequence</text><g filter="url(#sh)"><rect x="222" y="122" width="168" height="60" rx="14" fill="#a78bfa"/></g><text x="306.0" y="149" text-anchor="middle" font-size="15" font-weight="800" fill="#1e293b">구조</text><text x="306.0" y="167" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">structure</text><g filter="url(#sh)"><rect x="42" y="194" width="168" height="60" rx="14" fill="#34d399"/></g><text x="126.0" y="221" text-anchor="middle" font-size="15" font-weight="800" fill="#1e293b">제형</text><text x="126.0" y="239" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">formulation</text><g filter="url(#sh)"><rect x="222" y="194" width="168" height="60" rx="14" fill="#fbbf24"/></g><text x="306.0" y="221" text-anchor="middle" font-size="15" font-weight="800" fill="#1e293b">스트레스</text><text x="306.0" y="239" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">stress</text><g filter="url(#sh)"><rect x="470" y="110.0" width="156" height="116" rx="18" fill="url(#gRed)" /></g><text x="548.0" y="155.5" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">안정성 지표</text><text x="548.0" y="175.5" text-anchor="middle" font-size="13" font-weight="600" fill="#fee2e2">Stability</text><text x="548.0" y="196.5" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">응집·점도·산화…</text><g filter="url(#sh)"><rect x="760" y="110.0" width="316" height="116" rx="18" fill="url(#gOut)" /></g><text x="918.0" y="155.5" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">임상·품질 결과</text><text x="918.0" y="175.5" text-anchor="middle" font-size="13" font-weight="600" fill="#ffedd5">Outcomes</text><text x="918.0" y="196.5" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">효능·면역원성·약동학</text><line x1="414" y1="168.0" x2="464" y2="168.0" stroke="#94a3b8" stroke-width="3" marker-end="url(#arr)"/><text x="439.0" y="152.0" text-anchor="middle" font-size="13.5" font-weight="800" fill="#334155">Q1  무엇이 영향?</text><line x1="632" y1="168.0" x2="754" y2="168.0" stroke="#94a3b8" stroke-width="3" marker-end="url(#arr)"/><text x="693.0" y="152.0" text-anchor="middle" font-size="13.5" font-weight="800" fill="#334155">Q2  무엇에 영향?</text><text x="550.0" y="284" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">그래프도 이 순서로 읽어요 — 왼쪽 결정요인 → 가운데 안정성 → 오른쪽 결과</text></svg>